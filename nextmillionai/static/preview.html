<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nextmillionai — Data Preview</title>
<style>
  :root {
    --bg: #0d0f11;
    --card: #141719;
    --border: #232629;
    --text: #e8e0d6;
    --text2: #a09888;
    --text3: #6b6358;
    --green: #5db887;
    --blue: #7eb8d4;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
  }
  .container { max-width: 800px; margin: 0 auto; }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header a { color: var(--green); text-decoration: none; font-size: 13px; }
  .header a:hover { text-decoration: underline; }
  .banner {
    background: rgba(93, 184, 135, 0.08);
    border: 1px solid rgba(93, 184, 135, 0.2);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--green);
    margin-bottom: 24px;
    font-family: var(--mono);
  }
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .section h2 {
    font-size: 14px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .meta-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0;
    font-family: var(--mono); font-size: 12px;
  }
  .meta-key { color: var(--text3); }
  .meta-val { color: var(--text); }
  .source-section { margin-bottom: 8px; }
  .source-title {
    font-family: var(--mono); font-size: 13px;
    font-weight: 600; color: var(--blue);
    margin-bottom: 8px;
  }
  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 4px 24px;
  }
  .project-row {
    font-family: var(--mono); font-size: 11px;
    padding: 3px 0; color: var(--text2);
  }
  .project-name { color: var(--text); }
  .loading { color: var(--text3); font-style: italic; }
  .error { color: #e06c75; }
  .footer {
    margin-top: 24px; padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text3);
    text-align: center;
  }
  .footer a { color: var(--text3); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Data Preview</h1>
    <a href="/profile">Back to Profile</a>
  </div>

  <div class="banner">
    This data never leaves your machine. Nothing is uploaded, transmitted, or phoned home.
  </div>

  <div id="content">
    <div class="section"><p class="loading">Loading scan data...</p></div>
  </div>

  <div class="footer">
    <a href="https://github.com/nextmillionai/nextmillionai/blob/main/DATA_COLLECTION.md">Full data collection disclosure (DATA_COLLECTION.md)</a>
  </div>
</div>

<script>
(async function() {
  const el = document.getElementById('content');
  try {
    const res = await fetch('/api/scan-results');
    if (!res.ok) {
      el.innerHTML = '<div class="section"><p class="error">No scan data yet. Run <code>nextmillionai</code> first.</p></div>';
      return;
    }
    const data = await res.json();
    let html = '';

    // Overview
    const s = data.summary || {};
    html += `<div class="section">
      <h2>Overview</h2>
      <div class="meta-row"><span class="meta-key">Scanned at</span><span class="meta-val">${data.scanned_at || 'unknown'}</span></div>
      <div class="meta-row"><span class="meta-key">Tools detected</span><span class="meta-val">${(data.tools_detected || []).join(', ') || 'none'}</span></div>
      <div class="meta-row"><span class="meta-key">Total sessions</span><span class="meta-val">${s.total_sessions || 0}</span></div>
      <div class="meta-row"><span class="meta-key">AI code blocks</span><span class="meta-val">${s.total_ai_blocks || 0}</span></div>
      <div class="meta-row"><span class="meta-key">Scored commits</span><span class="meta-val">${s.total_scored_commits || 0}</span></div>
      <div class="meta-row"><span class="meta-key">Plans</span><span class="meta-val">${s.total_plans || 0}</span></div>
      <div class="meta-row"><span class="meta-key">Projects</span><span class="meta-val">${s.total_projects || 0}</span></div>
      <div class="meta-row"><span class="meta-key">AI usage span</span><span class="meta-val">${s.ai_usage_span_days || 0} days</span></div>
      <div class="meta-row"><span class="meta-key">Models used</span><span class="meta-val">${(s.models_used || []).slice(0, 8).join(', ') || 'none'}</span></div>
    </div>`;

    // Claude Code
    const cc = data.claude_code;
    if (cc) {
      html += `<div class="section">
        <h2>Claude Code</h2>
        <div class="stat-grid">
          <div class="meta-row"><span class="meta-key">Sessions</span><span class="meta-val">${cc.total_sessions || 0}</span></div>
          <div class="meta-row"><span class="meta-key">Messages</span><span class="meta-val">${cc.total_messages || 0}</span></div>
        </div>
      </div>`;
    }

    // Cursor IDE
    const cu = data.cursor;
    if (cu) {
      const ai = cu.ai_code || {};
      const sc = cu.scored_commits || {};
      const cv = cu.conversations || {};
      const pl = cu.plans || {};
      html += `<div class="section">
        <h2>Cursor IDE</h2>
        <div class="stat-grid">
          <div class="meta-row"><span class="meta-key">AI code blocks</span><span class="meta-val">${ai.total_blocks || 0}</span></div>
          <div class="meta-row"><span class="meta-key">Scored commits</span><span class="meta-val">${sc.total_commits || 0}</span></div>
          <div class="meta-row"><span class="meta-key">Conversations</span><span class="meta-val">${cv.total_conversations || 0}</span></div>
          <div class="meta-row"><span class="meta-key">Plans</span><span class="meta-val">${pl.total_plans || 0}</span></div>
        </div>
      </div>`;
    }

    // Codex CLI
    const cx = data.codex;
    if (cx) {
      html += `<div class="section">
        <h2>Codex CLI</h2>
        <div class="meta-row"><span class="meta-key">Sessions</span><span class="meta-val">${cx.total_sessions || 0}</span></div>
      </div>`;
    }

    // Git
    const git = data.git;
    if (git && git.projects) {
      const projects = git.projects;
      html += `<div class="section">
        <h2>Git (${projects.length} project${projects.length !== 1 ? 's' : ''})</h2>`;
      for (const p of projects.slice(0, 15)) {
        html += `<div class="project-row"><span class="project-name">${p.name || '?'}</span> — ${p.commits_6m || 0} commits</div>`;
      }
      if (projects.length > 15) {
        html += `<div class="project-row" style="color:var(--text3)">... and ${projects.length - 15} more</div>`;
      }
      html += '</div>';
    }

    // Consent status
    html += `<div class="section">
      <h2>Consent</h2>
      <div class="meta-row"><span class="meta-key">Status</span><span class="meta-val" style="color:var(--green)">Consented</span></div>
      <div class="meta-row"><span class="meta-key">Manage</span><span class="meta-val"><code>nextmillionai --reset-consent</code></span></div>
    </div>`;

    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div class="section"><p class="error">Failed to load scan data: ${e.message}</p></div>`;
  }
})();
</script>
</body>
</html>
