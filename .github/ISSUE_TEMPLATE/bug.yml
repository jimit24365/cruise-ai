name: Bug Report
description: Report a bug in cruise_ai
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `cruise_ai ...`
        2. Open http://localhost:5000
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
      description: What you expected to happen and what actually happened.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, Python version, tool versions"
      placeholder: "macOS 14, Python 3.12, Cursor 0.45"
